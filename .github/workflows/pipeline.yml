name: YouTube Skills Maker Pipeline

# This workflow runs the skill generation pipeline on a deterministic schedule.
# It checks out the repository, sets up Python, installs dependencies,
# runs the pipeline, and pushes any newly generated skill scaffolds back.

on:
  schedule:
    - cron: "0 0 * * *"   # Daily at midnight UTC (adjustable)
  workflow_dispatch:        # Allows manual triggering if needed

permissions:
  contents: write           # Needed to push commits back to the repo
  issues: read
  pull-requests: read

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else echo "No requirements.txt found"; fi

      - name: Run skill generation pipeline
        env:
          # Add any required environment variables here (e.g., YouTube API key)
          # YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          . .venv/bin/activate
          # Adjust arguments as needed; default runs configured video list
          python run.py

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push new skills
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add .
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit."
          else
            git commit -m "🤖 Auto‑generated skill scaffolds [skip ci]"
            git push origin main
          fi
